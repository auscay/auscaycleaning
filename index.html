<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


    <title>More Services</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        form {
            border: 4px solid #f1f1f1;
            font-family: Arial;
        }

        .container {
            padding: 20px;
            background-color: #f1f1f1;
        }

        input[type=text], input[type=submit] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        input[type=submit] {
            background-color: #04aa6d;
        }

        input[type=submit]:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <form>
        <div class="div container">
            <h2>MORE SERVICES COMING SOON!</h2>
            <p>Be the first to be informed when we launch our other services</p>
        </div>
        <div class="div container" style="background-color: white;">
            <input type="text" placeholder="Name" name="name" required>
            <input type="text" placeholder="Email Address" name="mail" required>
            <label>
                <input type="checkbox" checked name="Subscribe">Receive Discount Updates
            </label>
        </div>

        <div class="container">
             <input type="submit" value="Subscribe">
        </div>
    </form>



    <footer class="w3-container w3-padding-64 w3-center w3-opacity w3-light-grey w3-xlarge">
        <i class="fa fa-facebook-official w3-hover-opacity"></i>
        <i class="fa fa-instagram w3-hover-opacity"></i>
        <i class="fa fa-pinterest-p w3-hover-opacity"></i>
        <i class="fa fa-twitter w3-hover-opacity"></i>
        <p class="w3-medium" style="padding-top: 30px;">
        Powered by <a href="#">Auscay</a></p>
    </footer>
    



</body>
</html>
